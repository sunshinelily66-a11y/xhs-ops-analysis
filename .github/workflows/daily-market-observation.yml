name: Daily Market Observation

on:
  schedule:
    # GitHub Actions cron is UTC. 01:10 UTC is 09:10 in Asia/Shanghai.
    - cron: "10 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-market-observation
  cancel-in-progress: false

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect signals and push to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          DEEPSEEK_MAX_TOKENS: "2600"
          DEEPSEEK_TEMPERATURE: "0.4"
          SAVE_REPORT: "1"
          MAX_SIGNALS: "40"
          PER_QUERY: "5"
        run: python scripts/daily_market_observer.py

      - name: Commit report
        run: |
          if [[ -n "$(git status --porcelain memory/market/reports)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add memory/market/reports/*.md
            git commit -m "chore: add daily market observation"
            git push
          else
            echo "No report changes to commit."
          fi
